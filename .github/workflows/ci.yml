name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install:
    name: ci/install
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - name: Set up npm
        run: npm install -g npm@11.13.0
      - name: Install dependencies
        run: npm ci

  audit-signatures:
    name: ci/audit-signatures
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - name: Set up npm
        run: npm install -g npm@11.13.0
      - name: Install dependencies
        run: npm ci
      - name: Audit package signatures
        run: npm audit signatures --min-release-age=0

  audit-vulnerabilities:
    name: ci/audit-vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - name: Set up npm
        run: npm install -g npm@11.13.0
      - name: Install dependencies
        run: npm ci
      - name: Audit high severity vulnerabilities
        run: npm audit --audit-level=high

  format:
    name: ci/format
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - name: Set up npm
        run: npm install -g npm@11.13.0
      - name: Install dependencies
        run: npm ci
      - name: Format
        run: ./run.sh format

  check:
    name: ci/check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - name: Set up npm
        run: npm install -g npm@11.13.0
      - name: Install dependencies
        run: npm ci
      - name: Check repository
        run: ./run.sh check

  build:
    name: ci/build
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - name: Set up npm
        run: npm install -g npm@11.13.0
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: ./run.sh build
      - name: Preserve SPA fallback
        run: cp dist/index.html dist/404.html
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  test-coverage:
    name: ci/test-coverage
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - name: Set up npm
        run: npm install -g npm@11.13.0
      - name: Install dependencies
        run: npm ci
      - name: Test coverage
        run: ./run.sh test

  e2e-tests:
    name: ci/e2e-tests
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - name: Set up npm
        run: npm install -g npm@11.13.0
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: E2E tests
        run: ./run.sh e2e-tests

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - install
      - audit-signatures
      - audit-vulnerabilities
      - check
      - build
      - test-coverage
      - e2e-tests
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
